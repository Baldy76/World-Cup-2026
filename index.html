<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Elite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary-hex: #10b981; } /* Default Emerald */
        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            overscroll-behavior-y: contain;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .primary-text { color: var(--primary-hex); }
        .primary-bg { background-color: var(--primary-hex); }
        .primary-border { border-color: var(--primary-hex); }
    </style>
</head>
<body class="text-white font-sans pb-24 pt-12">
    
    <div id="countdown-banner" class="fixed top-0 w-full bg-blue-600/90 backdrop-blur-sm text-white text-[10px] uppercase tracking-widest font-black text-center py-1 z-30 hidden shadow-xl">
        Next: <span id="countdown-timer"></span>
    </div>

    <header class="glass mx-4 p-4 sticky top-8 z-20 shadow-2xl flex justify-between items-center rounded-2xl">
        <div class="flex items-center">
            <h1 class="text-2xl font-black italic tracking-tighter primary-text mr-3">WC26</h1>
            <button id="notify-btn" class="text-slate-500 hover:text-yellow-400 transition transform hover:scale-110">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
            </button>
        </div>
        
        <select id="my-team-selector" class="bg-white/5 text-xs text-white rounded-lg px-3 py-2 border border-white/10 outline-none focus:ring-2 focus:ring-emerald-500 transition">
            <option value="ALL">Global View</option>
        </select>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="status-message" class="text-center text-slate-500 text-[10px] uppercase tracking-widest mb-4 font-bold">
            Live Feed Syncing...
        </div>

        <div id="tab-matches" class="tab-content active space-y-4"></div>
        <div id="tab-groups" class="tab-content space-y-6"></div>
        <div id="tab-stats" class="tab-content space-y-4">
            <h2 class="text-xl font-black primary-text mb-4 text-center">GOLDEN BOOT</h2>
            <div id="scorers-container" class="glass rounded-2xl p-5 shadow-xl"></div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-4 right-4 glass rounded-3xl flex justify-around p-2 shadow-2xl z-30">
        <button onclick="switchTab('matches')" id="btn-matches" class="flex flex-col items-center py-2 px-4 transition-all duration-300 rounded-2xl primary-text">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Matches</span>
        </button>
        <button onclick="switchTab('groups')" id="btn-groups" class="flex flex-col items-center py-2 px-4 transition-all duration-300 rounded-2xl text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Groups</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center py-2 px-4 transition-all duration-300 rounded-2xl text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase">Stats</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
