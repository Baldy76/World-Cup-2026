<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans pb-20 pt-10">
    
    <div id="countdown-banner" class="fixed top-0 w-full bg-blue-600 text-white text-xs font-bold text-center py-1 z-20 hidden shadow-md">
        Next Match: <span id="countdown-timer">Calculating...</span>
    </div>

    <header class="bg-slate-800 p-4 sticky top-6 z-10 shadow-md flex justify-between items-center rounded-b-xl">
        <div class="flex items-center">
            <h1 class="text-xl font-bold text-emerald-400 mr-3">WC 2026</h1>
            <button id="notify-btn" class="text-slate-400 hover:text-yellow-400 transition" title="Enable Match Alerts">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </button>
        </div>
        
        <select id="my-team-selector" class="bg-slate-700 text-sm text-white rounded p-1 border border-slate-600 outline-none max-w-[120px] truncate">
            <option value="ALL">All Teams</option>
        </select>
    </header>

    <main class="p-4">
        <div id="status-message" class="text-center text-slate-400 animate-pulse mb-4 text-sm font-semibold">
            Syncing data...
        </div>

        <div id="tab-matches" class="tab-content active space-y-4 max-w-md mx-auto"></div>
        <div id="tab-groups" class="tab-content space-y-6 max-w-md mx-auto"></div>
        
        <div id="tab-stats" class="tab-content space-y-4 max-w-md mx-auto">
            <h2 class="text-xl font-bold text-yellow-500 mb-4 text-center border-b border-slate-700 pb-2">Golden Boot Race</h2>
            <div id="scorers-container" class="bg-slate-800 rounded-xl p-4 shadow-lg"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-800 border-t border-slate-700 flex justify-around p-3 pb-safe z-10">
        <button onclick="switchTab('matches')" id="btn-matches" class="flex flex-col items-center text-emerald-400 w-1/3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-xs mt-1">Matches</span>
        </button>
        <button onclick="switchTab('groups')" id="btn-groups" class="flex flex-col items-center text-slate-400 w-1/3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-xs mt-1">Groups</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center text-slate-400 w-1/3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-xs mt-1">Stats</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
