<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WC 2026 Elite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7" id="theme-meta">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- THE COLOR VARIABLES (Your Engine) --- */
        :root {
            --bg: #f2f2f7; --card: #ffffff; --text: #000000; --ios-grey: #e9e9eb;
            --primary-hex: #10b981; /* Emerald default */
        }
        body.dark-mode { 
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --ios-grey: #39393d; 
        }

        body { 
            background-color: var(--bg); color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh; overscroll-behavior-y: contain;
        }

        /* Glassmorphism Overlays */
        .glass {
            background: var(--card);
            opacity: 0.95;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--ios-grey);
        }

        .tab-content { display: none; animation: fadeIn 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- YOUR TOGGLE STYLING --- */
        .theme-segmented-control { 
            display: flex; background: var(--ios-grey); border-radius: 16px; padding: 4px; width: 100%; margin-top: 10px; 
        }
        .segment { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; 
            font-weight: 800; color: var(--text); opacity: 0.5; font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .segment.active { background: var(--card); opacity: 1; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        
        .primary-text { color: var(--primary-hex); }
        .primary-bg { background-color: var(--primary-hex); }
    </style>
</head>
<body class="font-sans pb-28 pt-12">
    
    <div id="countdown-banner" class="fixed top-0 w-full bg-blue-600 text-white text-[10px] uppercase tracking-widest font-black text-center py-1 z-30 hidden">
        Next: <span id="countdown-timer"></span>
    </div>

    <header class="glass mx-4 p-4 sticky top-8 z-20 shadow-lg flex justify-between items-center rounded-2xl">
        <h1 class="text-2xl font-black italic tracking-tighter primary-text">WC26</h1>
        <select id="my-team-selector" class="bg-transparent text-xs font-bold border-none outline-none text-right cursor-pointer">
            <option value="ALL">Global View</option>
        </select>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div id="tab-matches" class="tab-content active space-y-4"></div>
        <div id="tab-groups" class="tab-content space-y-6"></div>
        <div id="tab-stats" class="tab-content space-y-4"></div>

        <div id="tab-settings" class="tab-content space-y-6">
            <h2 class="text-xl font-black primary-text text-center">Settings</h2>
            
            <div class="glass p-5 rounded-2xl shadow-md">
                <span class="text-sm font-black uppercase opacity-50 block text-center mb-2">Appearance</span>
                <div class="theme-segmented-control">
                    <button id="btnLight" class="segment active" onclick="window.setThemeMode(false)">☀️ Light</button>
                    <button id="btnDark" class="segment" onclick="window.setThemeMode(true)">🌙 Dark</button>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl shadow-md space-y-4">
                <span class="text-sm font-black uppercase opacity-50 block text-center">System & API</span>
                
                <div class="flex justify-between items-center text-sm">
                    <span>API Status</span>
                    <span id="api-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-lg"></span>
                </div>

                <div class="flex justify-between items-center text-sm">
                    <span>Refresh Every</span>
                    <select id="refresh-rate" class="bg-transparent font-bold outline-none">
                        <option value="30000">30s</option>
                        <option value="60000">1m</option>
                        <option value="300000">5m</option>
                    </select>
                </div>

                <button onclick="nukeCache()" class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl text-sm font-black uppercase tracking-widest active:scale-95 transition">
                    Clear App Cache
                </button>
            </div>

            <div class="text-center text-[10px] opacity-30 font-bold uppercase tracking-widest">
                World Cup 2026 PWA v6.0.0
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-4 right-4 glass rounded-3xl flex justify-around p-2 shadow-2xl z-30">
        <button onclick="switchTab('matches')" id="btn-matches" class="flex flex-col items-center py-2 px-3 primary-text">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Matches</span>
        </button>
        <button onclick="switchTab('groups')" id="btn-groups" class="flex flex-col items-center py-2 px-3 opacity-40">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Groups</span>
        </button>
        <button onclick="switchTab('stats')" id="btn-stats" class="flex flex-col items-center py-2 px-3 opacity-40">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Stats</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="flex flex-col items-center py-2 px-3 opacity-40">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Settings</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
