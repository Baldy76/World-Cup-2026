<div class="glass p-5 rounded-2xl shadow-md space-y-4">
    <span class="text-sm font-black uppercase opacity-50 block text-center">System & API</span>
    
    <button onclick="manualSync()" id="sync-btn" class="w-full py-4 bg-emerald-500/10 text-emerald-500 rounded-xl text-sm font-black uppercase tracking-widest active:scale-95 transition flex justify-center items-center gap-3">
        <svg id="sync-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        Sync Data Now
    </button>

    <div class="flex justify-between items-center text-sm px-1 pt-2">
        <span>API Status</span>
        <span id="api-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-lg"></span>
    </div>

    <div class="flex justify-between items-center text-sm px-1">
        <span>Auto-Refresh</span>
        <select id="refresh-rate" class="bg-transparent font-bold outline-none">
            <option value="30000">30s</option>
            <option value="60000">1m</option>
            <option value="300000">5m</option>
        </select>
    </div>

    <button onclick="nukeCache()" class="w-full py-3 bg-red-500/5 text-red-500/50 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition">
        Reset App Cache
    </button>
</div>
